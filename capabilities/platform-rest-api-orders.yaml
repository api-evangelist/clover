        method: GET
        description: Clover Get a Single Order
        inputParameters:
        - name: mId
          in: path
          type: string
          required: true
          description: Merchant Id
        - name: orderId
          in: path
          type: string
          required: true
          description: Order Id
        - name: expand
          in: query
          type: string
          required: false
          description: 'Expandable fields: [lineItems, serviceCharge, discounts, credits, payments, customers, orderFulfillmentEvent, refunds]'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: v3-merchants-mid-orders-orderid
