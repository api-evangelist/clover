naftiko: 1.0.0-alpha2
info:
  label: Clover Platform REST API — ORDERS
  description: 'Clover Platform REST API — ORDERS. 8 operations. Lead operation: Create a New Line Item. Self-contained Naftiko capability covering one Clover business surface.'
  tags:
  - Clover
  - Platform REST API
  - ORDERS
  created: '2026-06-02'
  modified: '2026-06-02'
binds:
- namespace: env
  keys:
    CLOVER_API_TOKEN: CLOVER_API_TOKEN
capability:
