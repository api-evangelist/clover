    namespace: platform-rest-api-orders
    baseUri: https://api.clover.com
    description: Clover Platform REST API — ORDERS business capability. Self-contained, no shared references.
    authentication:
      type: bearer
      token: '{{env.CLOVER_API_TOKEN}}'
    resources:
    - name: v3-merchants-mid-orders-orderid-line-items
      path: /v3/merchants/{mId}/orders/{orderId}/line_items
      operations:
      - name: orderCreateLineItem
        method: POST
        description: Clover Create a New Line Item
        inputParameters:
        - name: mId
          in: path
          type: string
          required: true
          description: Merchant Id
        - name: orderId
          in: path
          type: string
          required: true
          description: Order Id
        - name: body
          in: body
          type: object
          required: true
          description: Request body payload.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: v3-merchants-mid-orders-orderid-line-items
      path: /v3/merchants/{mId}/orders/{orderId}/line_items
      operations:
      - name: orderGetOrderLineItems
        method: GET
        description: Clover Get All Line Items for an Order
        inputParameters:
        - name: mId
          in: path
          type: string
          required: true
          description: Merchant Id
        - name: orderId
          in: path
          type: string
          required: true
          description: Order Id
        - name: expand
          in: query
          type: string
          required: false
          description: 'Expandable fields: [employee, orderType, discounts, modifications, taxRates, payments]'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: v3-merchants-mid-orders
      path: /v3/merchants/{mId}/orders
      operations:
      - name: orderCreateOrder
        method: POST
        description: Clover Create Custom Orders
        inputParameters:
        - name: mId
          in: path
          type: string
          required: true
          description: Merchant identifier.
        - name: body
          in: body
          type: object
          required: true
          description: Request body payload.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: v3-merchants-mid-orders
      path: /v3/merchants/{mId}/orders
      operations:
      - name: orderGetOrders
        method: GET
        description: Clover Gets a List of Orders
        inputParameters:
        - name: mId
          in: path
          type: string
          required: true
          description: Merchant identifier (mId).
        - name: filter
          in: query
          type: string
          required: false
          description: "Filter fields to display search results: [employee.id, note, modifiedTime, orderType, touched, cardTransaction.last4, manualTransaction, employee.name, title, device.id, externalReferenceId, clientCreatedTime, total, payType, testMode, createdTime, id, state, deletedTime]\n `Note`: Search results for the list of orders list is restricted to the last 90 days if the filter fields include: [deletedTime, externalReferenceId, createdTime, total, payType, title, note, state, manualTransaction, cardTransaction.last4, testMode, touched]"
        - name: expand
          in: query
          type: string
          required: false
          description: 'Additional information provided as an expanded response: [employee, payments, refunds, credits, voids, payment.tender, payment.cardTransaction, lineItems, customers, serviceCharge, discounts, orderType, lineItems.discounts, lineItems.modifications]'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: v3-merchants-mid-orders-orderid-payments
      path: /v3/merchants/{mId}/orders/{orderId}/payments
      operations:
      - name: orderCreatePaymentForOrder
        method: POST
        description: Clover Create a Payment Record on an Order
        inputParameters:
        - name: mId
          in: path
          type: string
          required: true
          description: Merchant identifier.
        - name: orderId
          in: path
          type: string
          required: true
          description: Order identifier.
        - name: body
          in: body
          type: object
          required: true
          description: Request body payload.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: v3-merchants-mid-orders-orderid
      path: /v3/merchants/{mId}/orders/{orderId}
      operations:
      - name: orderUpdateOrder
        method: POST
        description: Clover Update an Order
        inputParameters:
        - name: mId
          in: path
          type: string
          required: true
          description: Merchant identifier.
        - name: orderId
          in: path
          type: string
          required: true
          description: Order identifier.
        - name: expand
          in: query
          type: string
          required: false
          description: 'Additional information provided as an expanded response: [lineItems, serviceCharge, discounts, credits, payments, customers, orderFulfillmentEvent, refunds]'
        - name: body
          in: body
          type: object
          required: true
          description: Request body payload.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
