      - type: SDKs
        title: iOS SDK
        url: https://github.com/clover/remote-pay-ios
  - aid: clover:go-sdk
    name: Clover Go SDK
    description: Mobile SDK (iOS, Android) for accepting card-present payments via Clover Go readers.
