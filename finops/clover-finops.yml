specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
provider: Clover
providerId: clover
created: '2026-05-08'
modified: '2026-06-02'
reconciled: true
tags:
- POS
- Payments
- Retail
- SMB
- Hardware
- FinOps
- Cost Management
- FOCUS
description: 'FOCUS-aligned FinOps for Clover: a take-rate-plus-subscription payments and POS platform.
  Merchants pay a monthly SaaS fee plus per-transaction processing (2.3%-2.6% + $0.10 card-present, 3.5%
  + $0.10 keyed/online); app developers earn via App Market revenue share.'
notes: 'Two distinct billing personas: merchant and app developer. Clover is a Fiserv company; invoices
  issue from the merchant''s acquiring bank / Fiserv-affiliated reseller.'
sources:
- https://www.clover.com/pos-systems
- https://docs.clover.com/dev/docs/transaction-data
- https://focus.finops.org/focus-specification/v1-3/
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: Fiserv, Inc.
serviceCategory: Payments
billingModel:
  pricingCategory: Take Rate + Subscription
  billingFrequency: Monthly
  billingCurrency: USD
  chargeCategories:
  - Purchase
  - Usage
  - Adjustment
  - Refund
focusColumns:
  ServiceName: Clover
  ServiceCategory: Payments
  ProviderName: Clover
  PublisherName: Fiserv, Inc.
  InvoiceIssuerName: Fiserv, Inc.
  BillingCurrency: USD
  ChargeCategory: Usage
meters:
- name: merchant_saas
  description: Monthly merchant SaaS subscription.
  unit: subscription
  aggregation: sum
  dimensions:
  - merchant
- name: card_present_processing
  description: Card-present transaction processing (2.3%-2.6% + $0.10).
  unit: transaction
  aggregation: sum
  dimensions:
  - merchant
  - card_brand
- name: card_not_present_processing
  description: Keyed and online (Ecommerce API) transaction processing (3.5% + $0.10).
  unit: transaction
  aggregation: sum
  dimensions:
  - merchant
  - card_brand
- name: processing_volume
  description: Total card processing dollar volume across channels.
  unit: USD
  aggregation: sum
  dimensions:
  - merchant
- name: app_market_revshare
  description: App Market subscription revenue share.
  unit: USD
  aggregation: sum
  dimensions:
  - app
  - merchant
principles:
- name: Visibility
  description: Pull payment and refund line items via the Clover Payments and Ecommerce Charges/Refunds
    APIs and the merchant statement; reconcile against acquiring-bank invoices from Fiserv.
- name: Allocation
  description: Tag invoice line items to consuming business units in your FinOps store.
- name: Optimization
  description: Levers depend on the provider's billing model; review at renewal once reconciled.
- name: Accountability
  description: Assign a contract owner to review billing against negotiated terms.
maintainers:
- FN: Kin Lane
  email: kin@apievangelist.com
