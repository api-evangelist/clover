    toolCount: 5
    tags:
    - Clover
    - Platform REST API
    - CUSTOMERS
  - name: Clover Platform REST API — EMPLOYEES
    file: capabilities/platform-rest-api-employees.yaml
    description: 'Clover Platform REST API — EMPLOYEES. 4 operations. Lead operation: Get a Single Employee. Self-contained Naftiko capability covering one Clover business surface.'
    toolCount: 4
    tags:
    - Clover
    - Platform REST API
    - EMPLOYEES
  - name: Clover Platform REST API — INVENTORY
    file: capabilities/platform-rest-api-inventory.yaml
    description: 'Clover Platform REST API — INVENTORY. 8 operations. Lead operation: Delete an Inventory Item. Self-contained Naftiko capability covering one Clover business surface.'
    toolCount: 8
    tags:
    - Clover
    - Platform REST API
    - INVENTORY
  - name: Clover Platform REST API — ORDERS
    file: capabilities/platform-rest-api-orders.yaml
    description: 'Clover Platform REST API — ORDERS. 8 operations. Lead operation: Create a New Line Item. Self-contained Naftiko capability covering one Clover business surface.'
    toolCount: 8
    tags:
    - Clover
    - Platform REST API
    - ORDERS
  - name: Clover Platform REST API — PAYMENTS
    file: capabilities/platform-rest-api-payments.yaml
    description: 'Clover Platform REST API — PAYMENTS. 2 operations. Lead operation: Get a Single Payment. Self-contained Naftiko capability covering one Clover business surface.'
    toolCount: 2
    tags:
    - Clover
    - Platform REST API
    - PAYMENTS
  personas:
  - id: merchant-developer
    name: Merchant Developer
    description: Builds POS and back-office integrations against merchant inventory, orders, and employees.
  - id: payments-engineer
    name: Payments Engineer
    description: Integrates ecommerce charges, tokenization, refunds, and hosted checkout.
  domains:
  - Inventory
  - Orders
  - Payments
  - Customers
  - Employees
  - Charges
  - Refunds
  - Tokens
  - Checkout
