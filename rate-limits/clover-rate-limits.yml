specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Clover
providerId: clover
created: '2026-05-08'
modified: '2026-05-08'
reconciled: false
tags:
- POS
- Payments
- Retail
- SMB
- Hardware
- Rate Limiting
- Quotas
- Throttling
description: 'Clover REST API enforces per-merchant and per-app rate limits. Documented guidance: stay
  under 16 requests/second per merchant token; bulk operations have separate guidance. Honor 429 with
  Retry-After.'
notes: Confirm tenant-specific quotas in your Clover developer dashboard.
sources:
- https://docs.clover.com/reference
responseCodes:
  throttled: 429
limits:
- name: Default REST
  scope: merchant
  metric: requests/second
  limit: 'guidance: ~16 RPS per merchant'
  notes: Honor 429 and Retry-After.
policies:
- name: Backoff Strategy
  description: Clients should implement exponential backoff with jitter and honor any Retry-After header.
