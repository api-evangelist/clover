        '401':
          description: Authentication required or invalid token.
        '429':
          description: Too many requests; rate limit exceeded.
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
  /v1/charges/{chargeId}:
    get:
      summary: Clover Get a Charge
      description: Retrieves the details of an existing charge. This information is also returned when a charge is first created, see [create a charge](https://docs.clover.com/reference/createcharge) or if it is refunded, see [create a refund](https://docs.clover.com/reference/createrefund).
      operationId: GetChargesCharge
      tags:
      - CHARGES
      parameters:
      - name: chargeId
        in: path
        required: true
        description: Universally unique identifier (UUID) of the charge.
        schema:
          type: string
        example: 9ABCDEF1234567
      responses:
        '200':
          description: Successful response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Charge'
              examples:
                GetChargesCharge200Example:
                  summary: Default GetChargesCharge 200 response
                  x-microcks-default: true
                  value:
                    amount: 1
                    tax_amount: 1
                    tip_amount: 1
                    additional_charges: {}
                    amount_refunded: 1
                    partial_auth: true
                    billing_details: {}
                    captured: true
                    created: 1
                    currency: example-value
                    customer: example-value
                    description: example-value
                    external_reference_id: example-value
                    external_customer_reference: example-value
                    auth_code: example-value
                    ref_num: example-value
                    failure_code: example-value
                    failure_message: example-value
                    warning_message: example-value
                    id: example-value
                    livemode: true
                    metadata: example-value
                    object: charge
                    order: example-value
                    outcome: {}
                    paid: true
                    payment_method_details: card
                    on_behalf_of: true
                    debt_payment: approved
                    receipt_email: example-value
                    receipt_number: example-value
                    receipt_url: example-value
                    site_url: example-value
                    refunded: true
                    shipping: example-value
                    source: {}
                    status: succeeded
                    stored_credentials: {}
                    soft_descriptor: {}
                    threeds: {}
                    gift_card: {}
                    level2: {}
                    level3: {}
                    saved_credentials_on_file: {}
                    ecomind: ecom
                    amount_captured: 1
        '401':
          description: Authentication required or invalid token.
        '429':
          description: Too many requests; rate limit exceeded.
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
  /v1/refunds:
    post:
      summary: Clover Create a Refund
      description: Creates a new refund that must be associated with an existing charge. Refunds are applied to the `source` used for the original payment. Partial refunds are allowed up to the original charge amount.
      operationId: CreateRefund
      tags:
      - REFUNDS
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Refund'
            examples:
              CreateRefundRequestExample:
                summary: Default CreateRefund request
                x-microcks-default: true
                value:
                  id: example-value
                  charge: example-value
                  amount: 1
                  status: example-value
      responses:
        '200':
          description: Successful response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Refund'
              examples:
                CreateRefund200Example:
                  summary: Default CreateRefund 200 response
                  x-microcks-default: true
                  value:
                    id: example-value
                    charge: example-value
                    amount: 1
                    status: example-value
        '401':
          description: Authentication required or invalid token.
        '429':
          description: Too many requests; rate limit exceeded.
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
    get:
      summary: Clover Get Refunds List
      description: Returns a list of all existing refunds. The newest refund is first in the list. The ten most recent refunds appear by default on the `charge` object.
      operationId: ListRefunds
      tags:
      - REFUNDS
      parameters:
      - name: charge
        in: query
        required: false
        description: Retrieve refunds applied to a specific charge.
        schema:
          type: string
        example: example-charge
      - name: created
        in: query
        required: false
        description: List filter based on the object's `created` field. The value can be a string with a Unix timestamp (in milliseconds) or a dictionary of multiple options describing a time range.
        schema:
          type: string
        example: example-created
      - name: ending_before
        in: query
        required: false
        description: Cursor used in pagination. The ending_before object ID sets your place in the list. For example, if you receive 100 objects in a list starting with obj_bar, add ending_before=obj_bar in your subsequent request to retrieve the previous page of the list.
        schema:
          type: string
        example: example-ending_before
      - name: limit
        in: query
        required: false
        description: The number of objects returned by the request, ranging between `1` and `100`. The default value is `10`.
        schema:
          type: integer
        example: 1
      - name: starting_after
        in: query
        required: false
        description: Cursor used in pagination. The starting_after object ID sets your place in the list. For example, if you receive 100 objects in a list starting with obj_foo, add starting_after=obj_foo in your subsequent request to retrieve the next page of the list.
        schema:
          type: string
        example: example-starting_after
      responses:
        '200':
          description: Successful response.
          content:
            application/json:
              schema:
                type: object
                properties:
                  elements:
                    type: array
                    items:
                      $ref: '#/components/schemas/Refund'
              examples:
                ListRefunds200Example:
                  summary: Default ListRefunds 200 response
                  x-microcks-default: true
                  value:
                    elements:
                    - {}
        '401':
          description: Authentication required or invalid token.
        '429':
          description: Too many requests; rate limit exceeded.
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
  /v1/refunds/{refundId}:
    get:
      summary: Clover Get a Refund
      description: Returns details of a specific refund.
      operationId: GetRefund
      tags:
      - REFUNDS
      parameters:
      - name: refundId
        in: path
        required: true
        description: Universal unique identifier (UUID) of the refund to retrieve.
        schema:
          type: string
        example: 9ABCDEF1234567
      responses:
        '200':
          description: Successful response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Refund'
              examples:
                GetRefund200Example:
                  summary: Default GetRefund 200 response
                  x-microcks-default: true
                  value:
                    id: example-value
                    charge: example-value
                    amount: 1
                    status: example-value
        '401':
          description: Authentication required or invalid token.
        '429':
          description: Too many requests; rate limit exceeded.
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
  /v1/tokens:
    post:
      summary: Clover Create a Card Token
      description: Creates a single-use token, which is a unique code that indicates credit card details. Use this token with endpoints like [create a charge](https://docs.clover.com/reference/createcharge) or [pay for an order](https://docs.clover.com/reference/postordersidpay).
      operationId: CreateToken
      tags:
      - TOKENS
      parameters:
      - name: apikey
        in: header
        required: true
        description: Public Ecommerce API key associated with a specific merchant and developer app. Use [Retrieve an Ecommerce API key or PAKMS key](https://docs.clover.com/dev/reference/getapikey) to generate this key.
        schema:
          type: string
        example: example-apikey
      - name: User-Agent
        in: header
        required: true
        description: 'Identifies the application, operating system, vendor, and/or version of the requesting user agent. Format: `<application>/<version>`'
        schema:
          type: string
        example: example-User-Agent
      responses:
        '200':
          description: Successful response.
        '401':
          description: Authentication required or invalid token.
        '429':
          description: Too many requests; rate limit exceeded.
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
  /invoicingcheckoutservice/v1/checkouts:
    post:
      summary: Clover Create Checkout
      description: '> **Note:** To use this endpoint, please select the **API Sandbox server** (`https://apisandbox.dev.clover.com`) from the Base URL dropdown in the right panel.


        Creates a hosted checkout payment object to connect an application. Use this endpoint to request a new checkout session for a customer transaction. For more information, see [Create a Hosted Checkout session request](https://docs.clover.com/dev/docs/creating-a-hosted-checkout-session).'
      operationId: CreateCheckout
      tags:
      - CHECKOUT
      parameters:
      - name: X-Clover-Merchant-Id
        in: header
        required: true
        description: Clover merchant identifier (mid).
        schema:
          type: string
        example: 9ABCDEF1234567
      responses:
        '200':
          description: Successful response.
        '401':
          description: Authentication required or invalid token.
        '429':
          description: Too many requests; rate limit exceeded.
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
components:
  securitySchemes:
    OAuth2:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: https://www.clover.com/oauth/authorize
          tokenUrl: https://api.clover.com/oauth/token
          scopes: {}
      description: OAuth 2.0 token or Ecommerce (PAKMS) API key.
  schemas:
    Charge:
      type: object
      properties:
        amount:
          type: integer
          format: int64
          description: "Charge amount in cents. If the charge request includes tax (`tax_rate_uuid` or `tax_amount`), this value must be the sum of any item prices and any tax or tip.\n For example, if the item cost = $10 and the tax is $1, the amount is 1100 cents ($11).\n Format: cents"
          example: 1099
        tax_amount:
          type: integer
          format: int64
          description: Amount paid in taxes. This value is not automatically added to the total amount. Your app must ensure the Amount property is the total final amount to charge the customer.
          example: 1099
        tip_amount:
          type: integer
          format: int64
          description: Amount paid in tips. This value is automatically added to the total amount when the transaction is finalized.
          example: 1099
        additional_charges:
          type: object
          example: {}
        amount_refunded:
          type: integer
          format: int64
          description: Amount refunded in cents. This value can be less than the amount property on the charge if a partial refund is issued.
          example: 1099
        partial_auth:
          type: boolean
          description: Indicates if the transaction was partially approved.
          example: true
        billing_details:
          type: object
          example: {}
        captured:
          type: boolean
          description: "Indicates whether to immediately capture the charge.\n Values:\n  True - Default.\n  False - Indicates the charge transaction type is AUTH (or PRE-AUTH), and the charge can be captured later using the [capture a charge](https://docs.clover.com/reference/capturecharge) endpoint."
          example: true
        created:
          type: integer
          format: int64
          description: Charge creation time (Unix timestamp in milliseconds).
          example: 1718153645000
        currency:
          type: string
          description: "Three-letter [ISO 4217 currency code](https://www.iso.org/iso-4217-currency-codes.html).\n Format: Lower case\n Length: Maximum 3"
          example: USD
        customer:
          type: string
          description: Unique identifier of the customer associated with the charge.
          example: example-customer
        description:
          type: string
          description: Detail description of the charge.
          example: Example description value.
        external_reference_id:
          type: string
          description: "Unique identifier (ID), such as an invoice or purchase order (PO) number, that is sent to the merchant's gateway and displayed in settlement records. \n Format: Supported for US—alphanumeric characters with in-between spaces. \n Length: Maximum 12, including spaces and alphanumeric characters."
          example: 9ABCDEF1234567
        external_customer_reference:
          type: string
          description: Customer reference number from the merchant's order management system.
          example: example-external_customer_reference
        auth_code:
          type: string
          description: Authorization code of the charge, if available.
          example: ABC123
        ref_num:
          type: string
          description: Reference number returned from the payment gateway when the transaction is successful.
          example: example-ref_num
        failure_code:
          type: string
          description: Error code explaining the reason for the charge failure.
          example: ABC123
        failure_message:
          type: string
          description: Detailed information about the reason for the charge failure.
          example: Example failure_message value.
        warning_message:
          type: string
          description: 'Detailed warning information about the charge. Example: Missing original transaction identifer for c-token.'
          example: Example warning_message value.
        id:
          type: string
          description: Unique identifier of the charge.
          example: 9ABCDEF1234567
        livemode:
          type: boolean
          description: Indicates whether the token object is live in production.
          example: true
        metadata:
          type: string
          description: "Set of key-value pairs that you can attach to the object. This parameter is useful for storing additional information about the object in a structured format.\n Length: Maximum 500 characters"
          example: example-metadata
        object:
          type: string
          description: Object type.
          enum:
          - charge
          example: charge
        order:
          type: string
          description: Unique identifier of the order.
          example: example-order
        outcome:
          type: object
          example: {}
        paid:
          type: boolean
          description: Indicates whether the charge was successful or authorized for capture.
          example: true
        payment_method_details:
          type: string
          description: Indicates the payment method used for the charge.
          enum:
          - card
          - ach
          - paypal
          - giftCard
          example: card
        on_behalf_of:
          type: boolean
          description: Indicates the transaction was made on someone's behalf.
          example: true
        debt_payment:
          type: string
          description: Indicates the status of the charge.
          enum:
          - approved
          - declined
          - not_processed
          example: approved
        receipt_email:
          type: string
