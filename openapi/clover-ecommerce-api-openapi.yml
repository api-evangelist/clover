openapi: 3.1.0
info:
  title: Clover Ecommerce API
  description: 'Clover Ecommerce API v1 — online (card-not-present) payments: charges, captures, refunds, tokenization, and hosted checkout. Authentication uses OAuth 2.0 / PAKMS Ecommerce API keys. Schemas and operations are derived from the Clover developer reference at docs.clover.com.'
  version: v1
  contact:
    name: Clover Developer Platform
    url: https://docs.clover.com/dev/reference
  x-generated-from: documentation
  x-last-validated: '2026-06-02'
servers:
- url: https://scl.clover.com
  description: Production Ecommerce
- url: https://scl-sandbox.dev.clover.com
  description: Sandbox Ecommerce
security:
- OAuth2: []
tags:
- name: Charges
  description: Create, capture, and retrieve ecommerce charges.
- name: Refunds
  description: Create and retrieve refunds for ecommerce charges.
- name: Tokens
  description: Tokenize cards for card-on-file and reuse.
- name: Checkout
  description: Hosted checkout sessions.
paths:
  /v1/charges:
    post:
      summary: Clover Create a Charge
      description: Charges a credit card or other payment source using data in the `charge` object. See [Create a charge](https://docs.clover.com/docs/create-a-charge) tutorial for more information.
      operationId: CreateCharge
      tags:
      - CHARGES
      parameters:
      - name: x-forwarded-for
        in: header
        required: true
        description: "Client internet protocol (IP) address of the web browser from which the customer’s payment originates.\n `Note:` Header x-forwarded-for is required for enhanced security and accuracy of Clover services. Requests that don’t include the header are not successful."
        schema:
          type: string
        example: example-x-forwarded-for
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Charge'
            examples:
              CreateChargeRequestExample:
                summary: Default CreateCharge request
                x-microcks-default: true
                value:
                  amount: 1
                  tax_amount: 1
                  tip_amount: 1
                  additional_charges: {}
                  amount_refunded: 1
                  partial_auth: true
                  billing_details: {}
                  captured: true
                  created: 1
                  currency: example-value
                  customer: example-value
                  description: example-value
                  external_reference_id: example-value
                  external_customer_reference: example-value
                  auth_code: example-value
                  ref_num: example-value
                  failure_code: example-value
                  failure_message: example-value
                  warning_message: example-value
                  id: example-value
                  livemode: true
                  metadata: example-value
                  object: charge
                  order: example-value
                  outcome: {}
                  paid: true
                  payment_method_details: card
                  on_behalf_of: true
                  debt_payment: approved
                  receipt_email: example-value
                  receipt_number: example-value
                  receipt_url: example-value
                  site_url: example-value
                  refunded: true
                  shipping: example-value
                  source: {}
                  status: succeeded
                  stored_credentials: {}
                  soft_descriptor: {}
                  threeds: {}
                  gift_card: {}
                  level2: {}
                  level3: {}
                  saved_credentials_on_file: {}
                  ecomind: ecom
                  amount_captured: 1
      responses:
        '200':
          description: Successful response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Charge'
              examples:
                CreateCharge200Example:
                  summary: Default CreateCharge 200 response
                  x-microcks-default: true
                  value:
                    amount: 1
                    tax_amount: 1
                    tip_amount: 1
                    additional_charges: {}
                    amount_refunded: 1
                    partial_auth: true
                    billing_details: {}
                    captured: true
                    created: 1
                    currency: example-value
                    customer: example-value
                    description: example-value
                    external_reference_id: example-value
                    external_customer_reference: example-value
                    auth_code: example-value
                    ref_num: example-value
                    failure_code: example-value
                    failure_message: example-value
                    warning_message: example-value
                    id: example-value
                    livemode: true
                    metadata: example-value
                    object: charge
                    order: example-value
                    outcome: {}
                    paid: true
                    payment_method_details: card
                    on_behalf_of: true
                    debt_payment: approved
                    receipt_email: example-value
                    receipt_number: example-value
                    receipt_url: example-value
                    site_url: example-value
                    refunded: true
                    shipping: example-value
                    source: {}
                    status: succeeded
                    stored_credentials: {}
                    soft_descriptor: {}
                    threeds: {}
                    gift_card: {}
                    level2: {}
                    level3: {}
                    saved_credentials_on_file: {}
                    ecomind: ecom
                    amount_captured: 1
        '401':
          description: Authentication required or invalid token.
        '429':
          description: Too many requests; rate limit exceeded.
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
    get:
      summary: Clover Get Charges
      description: Displays a list of existing charges. First displays the newest charge in the list. See [Get charges](https://docs.clover.com/docs/get-charges) tutorials for more information.
      operationId: GetCharges
      tags:
      - CHARGES
      parameters:
      - name: created
        in: query
        required: false
        description: created parameter.
        schema:
          type: string
        example: example-created
      - name: customer
        in: query
        required: false
        description: Displays charges associated with the provided `customer ID`.
        schema:
          type: string
        example: example-customer
      - name: ending_before
        in: query
        required: false
        description: Cursor used in pagination. The ending_before object ID sets your place in the list. For example, if you receive 100 objects in a list starting with obj_bar, add ending_before=obj_bar in your subsequent request to retrieve the previous page of the list.
        schema:
          type: string
        example: example-ending_before
      - name: expand
        in: query
        required: false
        description: Additional information provided as an expanded response, for example, a related object nested within the parent. See [Use expandable fields](https://docs.clover.com/docs/expanding-fields).
        schema:
          type: array
        example: []
      - name: limit
        in: query
        required: false
        description: "Number of objects returned by the request, ranging between 1 and 100.\n Default: 10"
        schema:
          type: integer
        example: 1
      - name: threeds_validation_result
        in: query
        required: false
        description: EMV® 3-D Secure (3DS) authentication result. 3-D Secure is a protocol that provides an additional security layer for online credit and debit card-not-present (CNP) transactions.
        schema:
          type: string
        example: example-threeds_validation_result
      - name: is_threeds
        in: query
        required: false
        description: Indicates whether the transaction is 3-D Secure authenticated.
        schema:
          type: boolean
        example: true
      - name: starting_after
        in: query
        required: false
        description: Cursor used in pagination. The starting_after object ID sets your place in the list. For example, if you receive 100 objects in a list starting with obj_foo, add starting_after=obj_foo in your subsequent request to retrieve the next page of the list.
        schema:
          type: string
        example: example-starting_after
      responses:
        '200':
          description: Successful response.
          content:
            application/json:
              schema:
                type: object
                properties:
                  elements:
                    type: array
                    items:
                      $ref: '#/components/schemas/Charge'
              examples:
                GetCharges200Example:
                  summary: Default GetCharges 200 response
                  x-microcks-default: true
                  value:
                    elements:
                    - {}
        '401':
          description: Authentication required or invalid token.
        '429':
          description: Too many requests; rate limit exceeded.
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
  /v1/charges/{chargeId}/capture:
    post:
      summary: Clover Capture a Charge
      description: As step two of the two-part payment flow, captures the payment of an existing but uncaptured charge. The first step is to [create a charge](https://docs.clover.com/reference/createcharge) with the capture option set to `false`.
      operationId: CaptureCharge
      tags:
      - CHARGES
      parameters:
      - name: x-forwarded-for
        in: header
        required: true
        description: "Client internet protocol (IP) address of the web browser from which the customer’s payment originates.\n `Note:` Header x-forwarded-for is required for enhanced security and accuracy of Clover services. Requests that don’t include the header are not successful."
        schema:
          type: string
        example: example-x-forwarded-for
      - name: chargeId
        in: path
        required: true
        description: Universal unique identifier (UUID) of the charge to capture.
        schema:
          type: string
        example: 9ABCDEF1234567
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Charge'
            examples:
              CaptureChargeRequestExample:
                summary: Default CaptureCharge request
                x-microcks-default: true
                value:
                  amount: 1
                  tax_amount: 1
                  tip_amount: 1
                  additional_charges: {}
                  amount_refunded: 1
                  partial_auth: true
                  billing_details: {}
                  captured: true
                  created: 1
                  currency: example-value
                  customer: example-value
                  description: example-value
                  external_reference_id: example-value
                  external_customer_reference: example-value
                  auth_code: example-value
                  ref_num: example-value
                  failure_code: example-value
                  failure_message: example-value
                  warning_message: example-value
                  id: example-value
                  livemode: true
                  metadata: example-value
                  object: charge
                  order: example-value
                  outcome: {}
                  paid: true
                  payment_method_details: card
                  on_behalf_of: true
                  debt_payment: approved
                  receipt_email: example-value
                  receipt_number: example-value
                  receipt_url: example-value
                  site_url: example-value
                  refunded: true
                  shipping: example-value
                  source: {}
                  status: succeeded
                  stored_credentials: {}
                  soft_descriptor: {}
                  threeds: {}
                  gift_card: {}
                  level2: {}
                  level3: {}
                  saved_credentials_on_file: {}
                  ecomind: ecom
                  amount_captured: 1
      responses:
        '200':
          description: Successful response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Charge'
              examples:
                CaptureCharge200Example:
                  summary: Default CaptureCharge 200 response
                  x-microcks-default: true
                  value:
                    amount: 1
                    tax_amount: 1
                    tip_amount: 1
                    additional_charges: {}
                    amount_refunded: 1
                    partial_auth: true
                    billing_details: {}
                    captured: true
                    created: 1
                    currency: example-value
                    customer: example-value
                    description: example-value
                    external_reference_id: example-value
                    external_customer_reference: example-value
                    auth_code: example-value
                    ref_num: example-value
                    failure_code: example-value
                    failure_message: example-value
                    warning_message: example-value
                    id: example-value
                    livemode: true
                    metadata: example-value
                    object: charge
                    order: example-value
                    outcome: {}
                    paid: true
                    payment_method_details: card
                    on_behalf_of: true
                    debt_payment: approved
                    receipt_email: example-value
                    receipt_number: example-value
                    receipt_url: example-value
                    site_url: example-value
                    refunded: true
                    shipping: example-value
                    source: {}
                    status: succeeded
                    stored_credentials: {}
                    soft_descriptor: {}
                    threeds: {}
                    gift_card: {}
                    level2: {}
