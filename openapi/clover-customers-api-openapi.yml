components:
  schemas:
    Customer:
      type: object
      properties:
        id:
          type: string
          description: Unique identifier.
          example: 9ABCDEF1234567
        merchant:
          type: object
          example: {}
        firstName:
          type: string
          description: 'First/given name of the customer. Note: Length of first name cannot be more than 64 characters.'
          example: Example firstName
        lastName:
          type: string
          description: 'Last name/surname of the customer. Note: Length of last name cannot be more than 64 characters.'
          example: Example lastName
        marketingAllowed:
          type: boolean
          description: Indicates if the customer allows receiving of marketing communication.
          example: true
        customerSince:
          type: integer
          format: int64
          description: Date of start of customer association with the merchant.
          example: 1718153645000
        orders:
          type: array
          items:
            type: object
          example: []
        addresses:
          type: array
          items:
            type: object
          example: []
        emailAddresses:
          type: array
          items:
            type: object
          example: []
        phoneNumbers:
          type: array
          items:
            type: object
          example: []
        cards:
          type: array
          items:
            type: object
          example: []
        metadata:
          type: object
          example: {}
      description: Clover Customer resource. Schema derived from the Clover Platform REST API v3 reference.
      x-schema-source: documentation
      x-source-url: https://docs.clover.com/dev/reference/customersgetcustomer
  securitySchemes:
    OAuth2:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: https://www.clover.com/oauth/authorize
          tokenUrl: https://api.clover.com/oauth/token
          scopes: {}
      description: OAuth 2.0 token or Ecommerce (PAKMS) API key.
