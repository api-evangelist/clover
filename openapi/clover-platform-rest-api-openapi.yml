components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: OAuth 2.0 access token or merchant API token.
  schemas:
    Item:
      type: object
      properties:
        id:
          type: string
          description: Unique identifier of the inventory item.
          example: 9ABCDEF1234567
        hidden:
          type: boolean
          description: "Indicates whether the inventory item is hidden on the Register app.\n Default: False"
          example: true
        available:
          type: boolean
          description: "Indicates whether the inventory item is available for sale across all channels.\n Default: True"
          example: true
        autoManage:
          type: boolean
          description: "Indicates whether the inventory item's availability is automatically or manually managed.\n Values:\n True - Item availability is automatically managed.\n False(default) - Item availability is manually managed. "
          example: true
        itemGroup:
          type: object
          example: {}
        options:
          type: array
          items:
            type: object
          example: []
        name:
          type: string
          description: Item name.
          example: Example name
        alternateName:
          type: string
          description: Alternate name of the item.
          example: Example alternateName
        code:
          type: string
          description: Item product code, such as Universal Product Code (UPC) or European Article Number (EAN).
          example: ABC123
        sku:
          type: string
          description: Stock keeping unit (SKU).
          example: SKU-001
        price:
          type: integer
          format: int64
          description: "Price of the item based on the merchant's local currency and price type, such as fixed, variable, or per unit price.\n For non-VAT merchants who do not pay value-added tax, this field is exclusive of tax.\n For VAT merchants, this field is inclusive of tax.\n Format: Cents"
          example: 1099
        priceType:
          type: string
          description: Price type, such as fixed, variable, or per unit price.
          enum:
          - FIXED
          - VARIABLE
          - PER_UNIT
          example: FIXED
        defaultTaxRates:
          type: boolean
          description: "Indicates whether or not to use the default tax rate. \n Default: True"
          example: true
        unitName:
          type: string
          description: Unit of measurement for the item, such as pound or meter.
          example: Example unitName
        cost:
          type: integer
          description: 'Cost of the item to a merchant as compared to the price payable by the customer, for example: wholesale versus retail price.'
          example: 1099
        isRevenue:
          type: boolean
          description: "Indicates whether this item is counted as revenue, for example: gift cards and donations are not counted as revenue.\n Default: False"
          example: true
        stockCount:
          type: integer
          description: Deprecated. Use itemStock.
          example: 1
        taxRates:
          type: array
          items:
            type: object
          example: []
        modifierGroups:
          type: array
          items:
            type: object
          example: []
        categories:
          type: array
          items:
            type: object
          example: []
        tags:
          type: array
          items:
            type: object
          example: []
        canonical:
          type: object
          example: {}
        itemStock:
          type: object
          example: {}
        MenuItem:
          type: object
          example: {}
        modifiedTime:
          type: integer
          description: Time when the item was modified.
          example: 1718153645000
        deletedTime:
          type: integer
          description: Time when the item was deleted.
          example: 1718153645000
        priceWithoutVat:
          type: integer
          description: "Item price without value-added tax (VAT).\n For non-VAT merchants, this field is not used.\n For VAT merchants, this field is the base price of an item."
          example: 1099
        colorCode:
          type: string
          description: "Hex code of the color assigned to the category and its items.\n Format: #fff, #ffffff, or #ffffffff."
          example: ABC123
      description: Clover Item resource. Schema derived from the Clover Platform REST API v3 reference.
      x-schema-source: documentation
      x-source-url: https://docs.clover.com/dev/reference/inventorygetitem
    Order:
      type: object
      properties:
        id:
          type: string
          description: Unique identifier
          example: 9ABCDEF1234567
        currency:
          type: string
          description: Currency of this order. For example, "USD"
          example: USD
        customers:
          type: array
          items:
            type: object
          example: []
        employee:
          type: object
          example: {}
        total:
          type: integer
          description: Total price of the order in cents
          example: 1099
        externalReferenceId:
          type: string
          description: External reference id if present in the order
          example: 9ABCDEF1234567
        unpaidBalance:
          type: integer
          description: The net of orders with payment minus the amount collected. Includes refunds, manual refunds, tax, tip, service charge, non-revenue items, paid gift card activations and loads and discounts
          example: 1099
        paymentState:
          type: string
          description: Is this order paid or not?
          enum:
          - OPEN
          - PAID
          - REFUNDED
          - CREDITED
          - PARTIALLY_PAID
          - PARTIALLY_REFUNDED
          example: OPEN
        title:
          type: string
          example: example-title
        note:
          type: string
          description: An arbitrary string with information about this order, may be printed on the order receipt and displayed in apps
          example: Example note value.
        orderType:
          type: object
          example: {}
        taxRemoved:
          type: boolean
          description: If true then this order should not have taxes applied to it
          example: true
        isVat:
          type: boolean
          description: This order was created by merchant with VAT enabled.
          example: true
        state:
          type: string
          description: A String generally describing the state of the order. If no value is set, the state defaults to null, which indicates a hidden order. A hidden order is not displayed in user interfaces and can only be retrieved by its id. When creating an order via the REST API the value must be manually set to "open". When creating an order via the Android SDK the value must be left empty and the value will be updated to "open" and "locked" automatically when actions such as taking payments and adding line items occur. The state value is not checked or enforced by the Clover server, at this time it is used for visualization purposes only.
          example: open
        manualTransaction:
          type: boolean
          description: Whether this order represents a manual transaction. A manual transaction is a transaction that has an arbitrary amount defined and is not associated with any inventory items. For example, the Clover Sale App and Clover Manual Transaction App create manual transactions. A manual transactions will have a single associated line item to hold the sale amount, but the generated receipt will display this differently to indicate that it is not considered a typical order with inventory items.
          example: true
        groupLineItems:
          type: boolean
          description: Whether similar line items should be grouped together on the receipt that this order generates. Item "similarity" is based on items having matching values for a set of properties including price, modifiers, and discounts.
          example: true
        testMode:
          type: boolean
          description: Whether this order was created in test mode. Payments made against test orders are not processed. Test mode orders can be deleted from the Orders App on the merchant's device or web dashboard (https://www.clover.com/orders/m/{mId}/orders). They will also be deleted when the device sends a POST to the /v2/merchant/{mId}/orders/delete_all_tests endpoint.
          example: true
        payType:
          type: string
          description: 'Possible values: SPLIT_GUEST, SPLIT_ITEM, SPLIT_CUSTOM, FULL. During the payment flow, if the user chooses to split the payment for this order, this field will be set to one of the SPLIT_* values to indicate how the full amount should be split. If the user chooses to pay for the order in full with one payment, then this field will be FULL.'
          enum:
          - SPLIT_GUEST
          - SPLIT_ITEM
          - SPLIT_CUSTOM
          - FULL
          example: SPLIT_GUEST
        createdTime:
          type: integer
          format: int64
          description: Creation timestamp
          example: 1718153645000
        clientCreatedTime:
          type: integer
          format: int64
          description: Time at which the client created this order.
          example: 1718153645000
        modifiedTime:
          type: integer
          format: int64
          description: Last modified time of the order.
          example: 1718153645000
        deletedTimestamp:
