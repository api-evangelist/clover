specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Clover
providerId: clover
created: '2026-05-08'
modified: '2026-05-08'
reconciled: false
tags:
- POS
- Payments
- Retail
- SMB
- Hardware
- Plans
description: Clover plans (Starter, Standard, Advanced, etc.) are merchant SaaS subscriptions tied to
  hardware bundles and processing rates from Fiserv-affiliated banks. Developer/API access is generally
  free; merchants pay for the platform.
notes: App developers can publish to the Clover App Market (revenue-share model).
sources:
- https://www.clover.com/pos-systems
- https://docs.clover.com/
plans:
- id: clover-developer
  name: Clover Developer (App Market)
  type: free
  description: Free developer accounts; published apps participate in revenue-share via the Clover App
    Market.
  entries:
  - label: Developer Account
    name: developer
    type: flat
    metric: account
    limit: -1
    timeFrame: perpetual
    geo: global
    unit: 1
    price: free
    userMultiplied: false
  elements:
  - name: Sandbox Access
  - name: Production via App Market Approval
- id: clover-merchant-saas
  name: Merchant SaaS Plans
  type: paid
  description: Merchant-facing plans (Starter, Standard, Advanced, etc.) bundled with hardware and payment
    processing.
  entries:
  - label: Monthly SaaS
    name: merchant_saas
    type: tiered
    metric: merchant subscription
    limit: -1
    timeFrame: monthly
    geo: global
    unit: 1
    price: varies by reseller and bundle
    userMultiplied: false
  elements:
  - name: POS Hardware
  - name: Payment Processing
maintainers:
- FN: Kin Lane
  email: kin@apievangelist.com
